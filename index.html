<head>

<title>LA28 · Session Explorer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1C1A2E;--ink2:#4A4760;--cream:#FBF4E6;--paper:#F4ECDA;
  --line:#D9CDAF;--card:#fff;
  --mag:#E8336D;--gold:#FFC94A;--sun:#FF8A3D;
  --remote:#8B86A3;
}
html,body{height:100%;font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;background:var(--cream);color:var(--ink);}
.app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--ink);color:var(--cream);flex-shrink:0;border-bottom:3px solid var(--mag);z-index:1000;}
.brand{font-weight:800;font-size:17px;white-space:nowrap;}
.brand b{color:var(--gold);}
.brand small{font-family:'Space Mono',monospace;font-size:9px;opacity:.45;margin-left:6px;font-weight:400;letter-spacing:.04em;}
.datebar{flex:1;display:flex;align-items:center;gap:8px;min-width:0;}
.dscroll{flex:1;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:2px 0;}
.dscroll::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;cursor:pointer;padding:5px 9px;border-radius:8px;border:1.5px solid transparent;background:rgba(255,255,255,.08);color:var(--cream);text-align:center;user-select:none;transition:background .12s,border-color .12s;}
.chip .dow{display:block;font-family:'Space Mono',monospace;font-size:8px;opacity:.5;text-transform:uppercase;letter-spacing:.05em;}
.chip .num{display:block;font-weight:700;font-size:13px;line-height:1.2;}
.chip .cnt{display:block;font-family:'Space Mono',monospace;font-size:7.5px;opacity:.4;margin-top:1px;}
.chip:hover{background:rgba(255,255,255,.15);}
.chip.active{background:var(--mag);border-color:var(--mag);}
.chip.special{color:var(--gold);}
.chip.special.active{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.narr{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:var(--cream);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.narr:hover{background:rgba(255,255,255,.12);}

/* BODY */
.body{flex:1;display:flex;min-height:0;}

/* MAP */
#map{flex:1;min-width:0;z-index:1;}

/* Custom Leaflet marker styles */
.vm-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.vm-circle{
  border-radius:50%;border:2.5px solid white;
  display:flex;align-items:center;justify-content:center;
  font-family:'Archivo',sans-serif;font-weight:700;color:white;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  cursor:pointer;
  transition:transform .1s;
  white-space:nowrap;
}
.vm-label{
  position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);
  background:rgba(28,26,46,.82);color:#fff;
  font-family:'Archivo',sans-serif;font-weight:600;font-size:10px;
  padding:2px 6px;border-radius:5px;white-space:nowrap;pointer-events:none;
}
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);border:1.5px solid var(--line);padding:0;}
.leaflet-popup-content{margin:0;font-family:'Archivo',sans-serif;}
.popup-inner{padding:12px 14px;min-width:200px;}
.popup-venue{font-weight:700;font-size:13px;margin-bottom:2px;}
.popup-zone{font-family:'Space Mono',monospace;font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.popup-row{display:flex;justify-content:space-between;gap:12px;padding:3px 0;border-top:1px solid #eee;font-size:11.5px;}
.popup-row:first-of-type{border:none;}
.popup-sport{color:#1C1A2E;}
.popup-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--mag);font-weight:700;flex-shrink:0;}
.popup-more{font-size:10px;color:#8B86A3;font-style:italic;margin-top:4px;}
.leaflet-popup-tip-container{display:none;}
.leaflet-popup-close-button{color:#4A4760!important;font-size:16px!important;padding:8px!important;}

/* MAP legend overlay */
.map-legend{
  position:absolute;bottom:24px;left:12px;z-index:1000;
  background:white;border:1.5px solid var(--line);border-radius:10px;
  padding:9px 12px;font-size:11px;color:var(--ink2);
  box-shadow:0 2px 8px rgba(0,0,0,.1);pointer-events:none;
}
.leg-h{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--ink2);margin-bottom:5px;}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* SIDE PANEL */
.side{width:480px;flex-shrink:0;background:var(--paper);border-left:1.5px solid var(--line);display:flex;flex-direction:column;min-height:0;transition:width .22s ease;}
.side.collapsed{width:0;border-left:none;overflow:hidden;}
.tabs{display:flex;border-bottom:1.5px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:10px 4px;text-align:center;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;transition:color .1s,border-color .1s;}
.tab.active{color:var(--ink);border-bottom-color:var(--mag);}
.scroll{flex:1;overflow-y:auto;padding:12px;}
.scroll::-webkit-scrollbar{width:6px;}
.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

/* Collapse toggle button — sits on the map edge */
.collapse-btn{
  position:absolute;
  top:50%;
  right:0;
  transform:translate(50%,-50%);
  z-index:1001;
  width:26px;height:48px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  font-size:12px;
  color:var(--ink2);
  transition:background .12s, color .12s;
  user-select:none;
}
.collapse-btn:hover{background:var(--paper);color:var(--ink);}

/* CARDS */
.block{margin-bottom:16px;}
.bhead{display:flex;align-items:center;gap:7px;margin-bottom:7px;position:sticky;top:0;background:var(--paper);padding:3px 0;z-index:5;}
.bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.blabel{font-weight:700;font-size:12.5px;flex:1;}
.bcnt{font-family:'Space Mono',monospace;font-size:9px;background:var(--cream);border:1px solid var(--line);padding:1px 6px;border-radius:20px;color:var(--ink2);}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .12s,transform .08s;}
.card:hover,.card.hi{border-color:var(--mag);transform:translateX(2px);}
.card.hi{background:#FFF5F8;}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px;}
.csport{font-weight:700;font-size:12.5px;}
.ctime{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--mag);font-weight:700;white-space:nowrap;flex-shrink:0;}
.cvenue{font-size:10.5px;color:var(--ink2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.vdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.zpill{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;background:var(--cream);border:1px solid var(--line);color:var(--ink2);padding:1px 5px;border-radius:20px;}
.cdesc{font-size:10.5px;color:var(--ink2);line-height:1.4;}
.badges{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.badge{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;padding:2px 6px;border-radius:20px;font-weight:700;}
.badge.fin{background:var(--gold);color:var(--ink);}
.badge.med{background:var(--mag);color:#fff;}
.rhead{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--remote);font-weight:700;margin:12px 0 8px;padding-top:12px;border-top:2px dashed var(--line);}
.empty{text-align:center;padding:36px 16px;color:var(--ink2);}
.empty .ico{font-size:28px;margin-bottom:8px;}
.vitem{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .12s;}
.vitem:hover{border-color:var(--mag);}
.vhead{font-weight:700;font-size:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
.vrow{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink2);padding:1.5px 0;}
.vrow b{color:var(--ink);font-weight:600;}
.about{font-size:12px;line-height:1.65;color:var(--ink2);}
.about h4{font-weight:700;font-size:12.5px;color:var(--ink);margin:14px 0 4px;}
.about h4:first-child{margin-top:0;}
.map-pane{position:relative;flex:1;min-width:0;}

/* SPORT PICKER */
.sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sport-btn{background:var(--card);border:1.5px solid var(--line);border-radius:9px;padding:7px 9px;cursor:pointer;transition:border-color .1s;text-align:left;}
.sport-btn:hover{border-color:var(--mag);}
.sport-btn .sb-name{font-weight:700;font-size:11.5px;color:var(--ink);display:block;line-height:1.3;}
.sport-btn .sb-cnt{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink2);opacity:.7;}
.sport-search{width:100%;padding:7px 10px;border:1.5px solid var(--line);border-radius:9px;font-family:'Archivo',sans-serif;font-size:12px;background:var(--card);color:var(--ink);margin-bottom:10px;outline:none;display:block;}
.sport-search:focus{border-color:var(--mag);}

/* SPORT TIMELINE */
.st-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1.5px solid var(--line);}
.st-back{font-family:'Space Mono',monospace;font-size:9px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--ink2);background:transparent;color:var(--ink2);cursor:pointer;flex-shrink:0;}
.st-back:hover{border-color:var(--mag);color:var(--mag);}
.st-title{font-weight:800;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.st-total{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink2);flex-shrink:0;}
.day-group{margin-bottom:14px;}
.day-group-head{font-family:'Space Mono',monospace;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);margin-bottom:6px;padding:3px 0;display:flex;align-items:center;gap:8px;}
.dg-day{background:var(--ink);color:var(--cream);padding:2px 7px;border-radius:20px;font-size:8.5px;}
.st-card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:border-color .12s;}
.st-card:hover,.st-card.hi{border-color:var(--mag);}
.st-card.hi{background:#FFF5F8;}
.st-card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:3px;}
.st-time{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--mag);font-weight:700;}
.st-venue{font-size:10.5px;color:var(--ink2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.st-desc{font-size:10.5px;color:var(--ink2);line-height:1.4;}
.st-code{opacity:.4;font-size:9px;font-family:'Space Mono',monospace;margin-top:2px;}
</style>
</head>

const DATES=[...new Set(SESSIONS.map(s=>s.date))].sort();

function sessForDate(d){return SESSIONS.filter(s=>s.date===d);}
function isRemote(k){return VENUES[k]&&VENUES[k].remote;}
function toMin(t){if(!t||t==='TBD')return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function period(s){const m=toMin(s.start);if(m===null)return'tbd';if(m<720)return'morning';if(m<1020)return'afternoon';return'evening';}
const PCOL={morning:'#FFC94A',afternoon:'#FF8A3D',evening:'#E8336D',tbd:'#8B86A3'};
function venueColor(list){
  const ps=new Set(list.map(period));ps.delete('tbd');
  if(!ps.size)return'#8B86A3';if(ps.size>1)return'#1C1A2E';
  return PCOL[[...ps][0]];
}
function fmtT(t){
  if(!t||t==='TBD')return'TBD';
  const[h,m]=t.split(':').map(Number);
  const ap=h>=12?'pm':'am';let hh=h%12;if(!hh)hh=12;
  return`${hh}:${String(m).padStart(2,'0')}${ap}`;
}
function esc(s){return s==null?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

// Store markers by venue key
const markerMap = {};
let currentGroups = {};
let selectedVenue = null;
let selectedSport = null;
let activeTab = 'timeline';

function makeIcon(color, count, r) {
  const size = r * 2;
  const fontSize = Math.max(9, Math.min(13, r * 0.75));
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${r}" cy="${r}" r="${r-1.5}" fill="${color}" stroke="white" stroke-width="2.5"/>
    <text x="${r}" y="${r+1}" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Archivo,sans-serif" font-weight="700" font-size="${fontSize}">${count}</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [size, size],
    iconAnchor: [r, r],
    popupAnchor: [0, -(r + 4)],
  });
}

function popupHtml(key, list) {
  const v = VENUES[key];
  const sorted = list.slice().sort((a,b) => (toMin(a.start)||9999) - (toMin(b.start)||9999));
  let h = `<div class="popup-inner">
    <div class="popup-venue">${esc(sname(key))}</div>
    <div class="popup-zone">${esc(v && v.zone || '')}</div>`;
  sorted.slice(0,6).forEach(s => {
    h += `<div class="popup-row"><span class="popup-sport">${esc(s.sport)}</span><span class="popup-time">${fmtT(s.start)}</span></div>`;
  });
  if (sorted.length > 6) h += `<div class="popup-more">+${sorted.length-6} more sessions</div>`;
  h += '</div>';
  return h;
}

function refreshMarkers() {
  // Remove old markers
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  for (const k in markerMap) delete markerMap[k];

  const localKeys = Object.keys(currentGroups).filter(k => !isRemote(k));
  const maxCount = Math.max(1, ...localKeys.map(k => currentGroups[k].length));

  localKeys.forEach(key => {
    const v = VENUES[key];
    if (!v || !v.lat || !v.lng) return;
    const list = currentGroups[key];
    const count = list.length;
    const r = Math.round(10 + 9 * (count / maxCount));
    const color = venueColor(list);
    const icon = makeIcon(color, count, r);
    const marker = L.marker([v.lat, v.lng], { icon, zIndexOffset: count * 10 });

    marker.bindPopup(popupHtml(key, list), {
      maxWidth: 280,
      className: 'clean-popup',
    });

    marker.on('click', () => {
      selectedVenue = (selectedVenue === key) ? null : key;
      renderPanel();
      // Re-render to show selection highlight
      refreshMarkerHighlights();
    });

    marker.addTo(map);
    markerMap[key] = marker;
  });
}

function refreshMarkerHighlights() {
  const localKeys = Object.keys(currentGroups).filter(k => !isRemote(k));
  const maxCount = Math.max(1, ...localKeys.map(k => currentGroups[k].length));
  localKeys.forEach(key => {
    const v = VENUES[key];
    if (!v || !markerMap[key]) return;
    const list = currentGroups[key];
    const count = list.length;
    const r = Math.round(10 + 9 * (count / maxCount));
    const color = venueColor(list);
    const isSel = selectedVenue === key;
    const size = r * 2;
    const fontSize = Math.max(9, Math.min(13, r * 0.75));
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${r}" cy="${r}" r="${r-1.5}" fill="${color}" stroke="${isSel ? '#1C1A2E' : 'white'}" stroke-width="${isSel ? 3.5 : 2.5}"/>
      <text x="${r}" y="${r+1}" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Archivo,sans-serif" font-weight="700" font-size="${fontSize}">${count}</text>
    </svg>`;
    markerMap[key].setIcon(L.divIcon({ html: svg, className: '', iconSize: [size,size], iconAnchor:[r,r], popupAnchor:[0,-(r+4)] }));
  });
}

// ── DATE CHIPS ────────────────────────────────────────────────────────────
let currentIdx = DATES.indexOf('2028-07-15');
if (currentIdx < 0) currentIdx = 0;

function buildGroups() {
  const d = DATES[currentIdx];
  const byV = {};
  sessForDate(d).forEach(s => {
    if (!byV[s.venueKey]) byV[s.venueKey] = [];
    byV[s.venueKey].push(s);
  });
  currentGroups = byV;
}

function updateBanner() {
  // Update date chip header info only — no separate banner div needed
}

function renderChips() {
  const el = document.getElementById('dscroll');
  el.innerHTML = '';
  DATES.forEach((d, i) => {
    const dd = new Date(d + 'T12:00:00');
    const allSess = sessForDate(d);
    const hasCer = SESSIONS.some(s => s.date === d && (s.sport === 'Opening Ceremony' || s.sport === 'Closing Ceremony'));
    const gamesDay = allSess.length > 0 ? allSess[0].gamesDay : null;
    const dayLabel = gamesDay === 0 ? 'D0' : gamesDay > 0 ? 'D' + gamesDay : 'D' + gamesDay;
    const c = document.createElement('div');
    c.className = 'chip' + (i === currentIdx ? ' active' : '') + (hasCer ? ' special' : '');
    c.innerHTML = `<span class="dow">${dayLabel}</span><span class="num">${dd.getDate()}</span><span class="cnt">${hasCer ? '★' : allSess.length}</span>`;
    c.onclick = () => { currentIdx = i; onDateChange(); };
    el.appendChild(c);
  });
  el.querySelector('.chip.active')?.scrollIntoView({ block: 'nearest', inline: 'center' });
}

document.getElementById('prev').onclick = () => { currentIdx = Math.max(0, currentIdx-1); onDateChange(); };
document.getElementById('next').onclick = () => { currentIdx = Math.min(DATES.length-1, currentIdx+1); onDateChange(); };

function onDateChange() {
  selectedVenue = null;
  buildGroups();
  renderChips();
  refreshMarkers();
  renderPanel();
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    if (activeTab !== 'sport') { selectedSport = null; refreshMarkers(); }
    renderPanel();
  };
});

function renderPanel() {
  if (activeTab === 'timeline') renderTimeline();
  else if (activeTab === 'zones') renderZones();
  else if (activeTab === 'venues') renderVenueList();
  else if (activeTab === 'sport') renderSportTab();
  else renderAbout();
}

function wireHover(el) {
  el.querySelectorAll('.card').forEach(c => {
    const vk = c.dataset.venue;
    c.onmouseenter = () => { if (markerMap[vk]) markerMap[vk].openPopup(); };
    c.onmouseleave = () => { if (markerMap[vk]) markerMap[vk].closePopup(); };
    c.onclick = () => {
      selectedVenue = (selectedVenue === vk) ? null : vk;
      refreshMarkerHighlights();
      if (markerMap[vk] && selectedVenue) {
        map.panTo(VENUES[vk]);
        markerMap[vk].openPopup();
      }
      renderPanel();
    };
  });
}

function cardHtml(s) {
  const col = venueColor([s]);
  const isSel = selectedVenue === s.venueKey;
  const badges = [];
  if (s.sessionType === 'Final' || s.sessionType === 'Bronze') badges.push('<span class="badge med">🥇 Medal</span>');
  return `<div class="card${isSel?' hi':''}" data-venue="${esc(s.venueKey)}">
    <div class="ctop"><span class="csport">${esc(s.sport)}</span><span class="ctime">${fmtT(s.start)}–${fmtT(s.end)}</span></div>
    <div class="cvenue"><span class="vdot" style="background:${col}"></span>${esc(sname(s.venueKey))}<span class="zpill">${esc(s.zone)}</span><span style="opacity:.4;font-size:9.5px">· ${esc(s.code)}</span></div>
    <div class="cdesc">${esc(s.description)}</div>
    ${badges.length ? '<div class="badges">'+badges.join('')+'</div>' : ''}
  </div>`;
}

function renderTimeline() {
  const p = document.getElementById('panel');
  const d = DATES[currentIdx];
  const dd = new Date(d + 'T12:00:00');
  let sess = sessForDate(d);
  if (selectedVenue) sess = sess.filter(s => s.venueKey === selectedVenue);
  const local = sess.filter(s => !isRemote(s.venueKey));
  const remote = sess.filter(s => isRemote(s.venueKey));

  if (!local.length && !remote.length) {
    p.innerHTML = '<div class="empty"><div class="ico">🏟️</div>No sessions this day.</div>'; return;
  }

  const blks = { morning:[], afternoon:[], evening:[], tbd:[] };
  local.forEach(s => blks[period(s)].push(s));
  const meta = {
    morning: { label:'Morning · before noon', col:'#FFC94A' },
    afternoon: { label:'Afternoon · 12–5pm', col:'#FF8A3D' },
    evening: { label:'Evening · after 5pm', col:'#E8336D' },
    tbd: { label:'Time TBD', col:'#8B86A3' },
  };

  const dayLabel = `${DOW[dd.getDay()]}, ${MONS[dd.getMonth()]} ${dd.getDate()}`;
  const totalLocal = local.length;
  let h = `<div style="font-family:'Space Mono',monospace;font-size:9.5px;color:var(--ink2);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--line);">${dayLabel} &nbsp;·&nbsp; ${totalLocal} LA-area sessions${selectedVenue ? ' · <span style="color:var(--mag)">'+esc(sname(selectedVenue))+'</span>' : ''}</div>`;

  if (selectedVenue) {
    h += `<div style="margin-bottom:10px;"><button onclick="clearSel()" style="font-family:'Space Mono',monospace;font-size:9px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--mag);background:transparent;color:var(--mag);cursor:pointer;">✕ Clear filter</button></div>`;
  }

  ['morning','afternoon','evening','tbd'].forEach(key => {
    const list = blks[key].sort((a,b) => (toMin(a.start)||9999)-(toMin(b.start)||9999));
    if (!list.length) return;
    h += `<div class="block"><div class="bhead"><span class="bdot" style="background:${meta[key].col}"></span><span class="blabel">${meta[key].label}</span><span class="bcnt">${list.length}</span></div>`;
    list.forEach(s => { h += cardHtml(s); });
    h += '</div>';
  });

  if (remote.length) {
    h += `<div class="rhead">Outside LA · ${remote.length} session${remote.length>1?'s':''}</div>`;
    remote.sort((a,b) => (toMin(a.start)||9999)-(toMin(b.start)||9999)).forEach(s => { h += cardHtml(s); });
  }

  p.innerHTML = h;
  wireHover(p);
}

window.clearSel = function() { selectedVenue = null; refreshMarkerHighlights(); renderPanel(); };

function renderZones() {
  const p = document.getElementById('panel');
  const d = DATES[currentIdx];
  const dd = new Date(d + 'T12:00:00');
  const local = sessForDate(d).filter(s => !isRemote(s.venueKey));
  if (!local.length) { p.innerHTML = '<div class="empty"><div class="ico">📍</div>No LA sessions today.</div>'; return; }

  const byZone = {};
  local.forEach(s => {
    if (!byZone[s.zone]) byZone[s.zone] = [];
    byZone[s.zone].push(s);
  });

  const dayLabel = `${DOW[dd.getDay()]}, ${MONS[dd.getMonth()]} ${dd.getDate()}`;
  let h = `<div style="font-family:'Space Mono',monospace;font-size:9.5px;color:var(--ink2);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--line);">${dayLabel} &nbsp;·&nbsp; ${Object.keys(byZone).length} zones active</div>`;

  Object.keys(byZone).sort((a,b) => byZone[b].length - byZone[a].length).forEach(zone => {
    const list = byZone[zone].sort((a,b) => (toMin(a.start)||9999)-(toMin(b.start)||9999));
    const venues = [...new Set(list.map(s => s.venueKey))];
    h += `<div class="block"><div class="bhead"><span class="bdot" style="background:var(--mag)"></span><span class="blabel">${esc(zone)}</span><span class="bcnt">${list.length} sess · ${venues.length} venue${venues.length>1?'s':''}</span></div>`;
    list.forEach(s => { h += cardHtml(s); });
    h += '</div>';
  });

  p.innerHTML = h;
  wireHover(p);
}

function renderVenueList() {
  const p = document.getElementById('panel');
  const local = Object.keys(currentGroups).filter(k => !isRemote(k))
    .sort((a,b) => currentGroups[b].length - currentGroups[a].length);
  if (!local.length) { p.innerHTML = '<div class="empty"><div class="ico">🗺️</div>No venues today.</div>'; return; }
  let h = '';
  local.forEach(k => {
    const list = currentGroups[k].slice().sort((a,b) => (toMin(a.start)||9999)-(toMin(b.start)||9999));
    const col = venueColor(list);
    const zone = VENUES[k] && VENUES[k].zone || '';
    const isSel = selectedVenue === k;
    h += `<div class="vitem${isSel?' hi':''}" data-venue="${esc(k)}">
      <div class="vhead"><span class="vdot" style="background:${col}"></span>${esc(sname(k))}<span class="zpill">${esc(zone)}</span></div>`;
    list.forEach(s => { h += `<div class="vrow"><span>${esc(s.sport)}</span><b>${fmtT(s.start)}</b></div>`; });
    h += '</div>';
  });
  p.innerHTML = h;
  p.querySelectorAll('.vitem').forEach(el => {
    const vk = el.dataset.venue;
    el.onmouseenter = () => { if (markerMap[vk]) markerMap[vk].openPopup(); };
    el.onmouseleave = () => { if (markerMap[vk]) markerMap[vk].closePopup(); };
    el.onclick = () => {
      selectedVenue = (selectedVenue === vk) ? null : vk;
      refreshMarkerHighlights();
      if (VENUES[vk] && selectedVenue) map.panTo([VENUES[vk].lat, VENUES[vk].lng]);
      renderPanel();
    };
  });
}

function renderSportTab() {
  const p = document.getElementById('panel');
  if (selectedSport) { renderSportTimeline(selectedSport); return; }

  const counts = {};
  SESSIONS.forEach(s => { counts[s.sport] = (counts[s.sport]||0)+1; });
  const groups = Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]));

  let h = `<input class="sport-search" id="sportSearch" placeholder="Search 60 sports…" autocomplete="off">`;
  h += `<div class="sport-grid" id="sportGrid">`;
  groups.forEach(([sport, cnt]) => {
    h += `<div class="sport-btn" data-sport="${esc(sport)}"><span class="sb-name">${esc(sport)}</span><span class="sb-cnt">${cnt} session${cnt>1?'s':''}</span></div>`;
  });
  h += `</div>`;
  p.innerHTML = h;

  p.querySelectorAll('.sport-btn').forEach(btn => {
    btn.onclick = () => {
      selectedSport = btn.dataset.sport;
      refreshMarkersForSport(selectedSport);
      renderSportTimeline(selectedSport);
    };
  });

  const searchEl = document.getElementById('sportSearch');
  searchEl.oninput = () => {
    const q = searchEl.value.toLowerCase();
    p.querySelectorAll('.sport-btn').forEach(btn => {
      btn.style.display = btn.dataset.sport.toLowerCase().includes(q) ? '' : 'none';
    });
  };
}

function renderSportTimeline(sport) {
  const p = document.getElementById('panel');
  const allSess = SESSIONS.filter(s => s.sport === sport)
    .sort((a,b) => a.date.localeCompare(b.date) || (toMin(a.start)||0)-(toMin(b.start)||0));

  const byDate = {};
  allSess.forEach(s => { (byDate[s.date] = byDate[s.date]||[]).push(s); });
  const medals = allSess.filter(s => s.sessionType==='Final'||s.sessionType==='Bronze').length;

  let h = `<div class="st-header">
    <button class="st-back" id="sportBack">← All Sports</button>
    <span class="st-title">${esc(sport)}</span>
    <span class="st-total">${allSess.length} sess${medals?' · '+medals+' 🥇':''}</span>
  </div>`;

  Object.entries(byDate).forEach(([date, list]) => {
    const dd = new Date(date+'T12:00:00');
    const gd = list[0].gamesDay;
    const dayTag = gd > 0 ? 'D'+gd : gd===0 ? 'D0' : 'D'+gd;
    const dateLabel = DOW[dd.getDay()]+', '+MONS[dd.getMonth()]+' '+dd.getDate();
    h += `<div class="day-group"><div class="day-group-head"><span class="dg-day">${dayTag}</span>${dateLabel}</div>`;
    list.forEach(s => { h += sportCardHtml(s); });
    h += `</div>`;
  });

  p.innerHTML = h;

  document.getElementById('sportBack').onclick = () => {
    selectedSport = null;
    refreshMarkers();
    renderSportTab();
  };

  p.querySelectorAll('.st-card').forEach(c => {
    const vk = c.dataset.venue;
    const date = c.dataset.date;
    c.onmouseenter = () => { if (markerMap[vk]) markerMap[vk].openPopup(); };
    c.onmouseleave = () => { if (markerMap[vk]) markerMap[vk].closePopup(); };
    c.onclick = () => {
      // Jump to that date and highlight that venue in the timeline tab
      const idx = DATES.indexOf(date);
      if (idx >= 0) {
        currentIdx = idx;
        selectedVenue = vk;
        buildGroups();
        renderChips();
        refreshMarkersForSport(sport);
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        document.querySelector('.tab[data-tab="timeline"]').classList.add('active');
        activeTab = 'timeline';
        renderTimeline();
      }
    };
  });
}

function sportCardHtml(s) {
  const col = venueColor([s]);
  const isMedal = s.sessionType==='Final'||s.sessionType==='Bronze';
  const isRemoteV = isRemote(s.venueKey);
  return `<div class="st-card" data-venue="${esc(s.venueKey)}" data-date="${esc(s.date)}">
    <div class="st-card-top">
      <span class="st-time">${fmtT(s.start)}${s.end?'–'+fmtT(s.end):''}</span>
      ${isMedal?'<span class="badge med" style="flex-shrink:0">🥇 Medal</span>':''}
    </div>
    <div class="st-venue"><span class="vdot" style="background:${col}"></span>${esc(sname(s.venueKey))}<span class="zpill">${esc(s.zone)}</span>${isRemoteV?'<span class="zpill" style="background:#E8E4F0;color:#8B86A3">Remote</span>':''}</div>
    <div class="st-desc">${esc(s.description)}</div>
    <div class="st-code">${esc(s.code)} · ${esc(s.sessionType)}</div>
  </div>`;
}

function refreshMarkersForSport(sport) {
  const sportVenues = new Set(SESSIONS.filter(s=>s.sport===sport).map(s=>s.venueKey));
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  for (const k in markerMap) delete markerMap[k];

  const localKeys = Object.keys(currentGroups).filter(k=>!isRemote(k));
  const maxCount = Math.max(1,...localKeys.map(k=>currentGroups[k].length));

  localKeys.forEach(key => {
    const v = VENUES[key];
    if (!v||!v.lat||!v.lng) return;
    const list = currentGroups[key];
    const isSport = sportVenues.has(key);
    const count = list.length;
    const sportList = list.filter(s=>s.sport===sport);
    const r = Math.round(10+9*(count/maxCount));
    const color = isSport ? venueColor(sportList.length?sportList:list) : '#C0BBCC';
    const displayCount = isSport ? sportList.length : count;
    const opacity = isSport ? 1 : 0.28;
    const size=r*2, fs=Math.max(9,Math.min(13,r*0.75));
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" opacity="${opacity}"><circle cx="${r}" cy="${r}" r="${r-1.5}" fill="${color}" stroke="white" stroke-width="${isSport?3:2}"/><text x="${r}" y="${r+1}" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Archivo,sans-serif" font-weight="700" font-size="${fs}">${displayCount}</text></svg>`;
    const marker=L.marker([v.lat,v.lng],{icon:L.divIcon({html:svg,className:'',iconSize:[size,size],iconAnchor:[r,r],popupAnchor:[0,-(r+4)]}),zIndexOffset:isSport?count*20:0});
    marker.bindPopup(popupHtml(key,sportList.length?sportList:list),{maxWidth:280,className:'clean-popup'});
    marker.addTo(map);
    markerMap[key]=marker;
  });
}

function renderAbout() {
  document.getElementById('panel').innerHTML = `<div class="about">
    <h4>How to use</h4>
    Pick a date above. Markers appear on the real LA map for every venue with sessions that day — size = number of sessions, color = time of day. Click a marker or hover a session card to highlight venues. Click a card to filter to that venue; click again to clear.
    <h4>Zones</h4>
    "By Zone" groups sessions by the official LA28 zone so you can see which sports share a neighborhood. Same zone = potentially walkable or short drive. The gold dotted lines in the map connect venues with sessions starting within ~45 min.
    <h4>Key venue names</h4>
    <b>2028 Stadium</b> = SoFi Stadium, Inglewood (Swimming, Water Polo used the aquatics setup). <b>DTLA Arena</b> = Crypto.com Arena. <b>Long Beach Aquatics Center</b> = Water Polo venue. <b>Valley Complexes 1–4</b> = temporary structures in Sepulveda Basin. <b>Conv Ctr Halls 1–3</b> = same LACC building. Carson zone has five sub-venues on the Dignity Health Sports Park campus: Carson Stadium (Archery, Rugby 7s), Carson Field (Hockey), Carson Velodrome (Track Cycling), Carson Tennis Center (Tennis).
    <h4>Outside LA</h4>
    Football group stage, Softball, and Canoe Slalom (OKC) are not on the map — they appear in the panel only.
    <h4>Source</h4>
    LA28 Competition Schedule v3.1. Session codes, zones, and venues from the official PDF. Coordinates researched per venue.
  </div>`;
}

// ── COLLAPSE TOGGLE ──────────────────────────────────────────────────────
const collapseBtn = document.getElementById('collapseBtn');
const sideEl = document.querySelector('.side');
let panelCollapsed = false;

collapseBtn.addEventListener('click', () => {
  panelCollapsed = !panelCollapsed;
  sideEl.classList.toggle('collapsed', panelCollapsed);
  // Arrow flips direction: › when panel open (pointing right = close), ‹ when closed
  collapseBtn.innerHTML = panelCollapsed ? '&#8249;' : '&#8250;';
  // Let Leaflet know the map container resized
  setTimeout(() => map.invalidateSize(), 230);
});

// ── INIT ──────────────────────────────────────────────────────────────────
buildGroups();
renderChips();
refreshMarkers();
renderPanel();
</script>
